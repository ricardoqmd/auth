# --- SonarQube Cloud project identity ---
# Confirm these against what SonarCloud assigns on import
# (usually organization = your GitHub org slug, projectKey = <org>_<repo>).
sonar.organization=ricardoqmd
sonar.projectKey=ricardoqmd_auth

# --- Sources & tests (pnpm monorepo: three packages) ---
sonar.sources=packages/auth-core/src,packages/auth-keycloak/src,packages/auth-nextjs/src
sonar.tests=packages/auth-core/src,packages/auth-keycloak/src,packages/auth-nextjs/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# --- Coverage (LCOV produced by vitest, one report per package) ---
sonar.javascript.lcov.reportPaths=packages/auth-core/coverage/lcov.info,packages/auth-keycloak/coverage/lcov.info,packages/auth-nextjs/coverage/lcov.info

# --- Exclusions ---
sonar.exclusions=**/dist/**,**/node_modules/**,apps/**,**/*.config.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.config.ts
